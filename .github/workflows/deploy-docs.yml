name: Deploy docs to GitHub Pages

# Requiere: Settings → Pages → Source = "GitHub Actions".
# Nota: en repos privados, GH Pages necesita GitHub Pro/Team/Enterprise.
# Si el repo queda privado en el free tier, una alternativa es Cloudflare Pages.

on:
  push:
    branches: [main]
    paths:
      - "content/**"
      - ".vitepress/**"
      - "course.yaml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress site
        env:
          DOCS_BASE: /curso-claude-console/
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
