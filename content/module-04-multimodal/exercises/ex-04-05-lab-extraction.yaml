  // TODO 3: Llamar a messages.create con betas: ['files-api-2025-04-14'].
  //   model: claude-sonnet-4-6, max_tokens: 1500.

  // TODO 4: Renderizar la respuesta como markdown con citas agrupadas por documento.
  //   Formato sugerido:
  //     <texto del response con [^N] markers>
  //     ---
