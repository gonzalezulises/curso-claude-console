    },
  ];

  // TODO 1: Escribir los 3 docs a disco, subirlos con Files API.
  //   Guardar los file objects retornados.

  // TODO 2: Armar el content array con:
  //   - 3 document blocks (source: {type:'file', file_id}, title, citations: {enabled:true})
  //   - 1 text block con pregunta cross-documento:
  //     "Basado en los 3 papers: ¿qué arquitectura introdujo el primero, cómo escala
  //      óptimamente el modelo según el segundo, y qué resultado mostró InstructGPT
