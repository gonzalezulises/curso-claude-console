  // TODO 1: Llamar a messages.create con:
  //   - Un documento type: "document", source type: "text", media_type: "text/plain"
  //   - title: "Product Strategy Meeting Notes 2025"
  //   - citations: { enabled: true }
  //   - Una pregunta que requiera cruzar datos: "¿Cuándo lanza el MVP y cuál es el precio del tier Pro?"

