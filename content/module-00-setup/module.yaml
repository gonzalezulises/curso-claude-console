id: module-00
slug: module-00-setup
title: "Setup & Primer Contacto"
order: 0
duration_hours: 2
is_locked: false
status: completed

description: >
  Prepara tu cuenta en platform.claude.com, entiende los tipos de API keys y por
  qué se separan, ejecuta tu primer curl contra /v1/messages, recorre el
  dashboard para ubicar cada sección y deja tu entorno local (Node + Python)
  listo para el resto del curso.

learning_outcomes:
  - "Crear una cuenta en Claude Console y entender organization vs workspace"
  - "Distinguir entre workspace API keys y admin API keys, y saber cuándo usar cada una"
  - "Ejecutar tu primer request a /v1/messages con curl"
  - "Navegar cada sección del dashboard y saber qué se hace en cada una"
  - "Tener Node.js 20+ y Python 3.11+ configurados para correr cualquier ejercicio del curso"

prerequisites:
  - "Terminal básico (cd, ls, nano o tu editor preferido)"
  - "Curiosidad, paciencia para leer"

