solution_code: |
  import json
  import os
  import urllib.request

  API_KEY = os.environ.get("ANTHROPIC_API_KEY")
  if not API_KEY:
      raise SystemExit("Falta ANTHROPIC_API_KEY en el entorno")

  URL = "https://api.anthropic.com/v1/messages"

  body = {
      "model": "claude-haiku-4-5",
      "max_tokens": 128,
      "messages": [
          {"role": "user", "content": "Responde con la palabra 'ok' y nada más."}
      ],
  }

  headers = {
      "x-api-key": API_KEY,
      "anthropic-version": "2023-06-01",
      "content-type": "application/json",
  }

  request = urllib.request.Request(
      URL,
      data=json.dumps(body).encode("utf-8"),
      headers=headers,
      method="POST",
  )

  with urllib.request.urlopen(request) as response:
      payload = json.loads(response.read())

  response_text = payload["content"][0]["text"]
  stop_reason = payload["stop_reason"]
  total_tokens = payload["usage"]["input_tokens"] + payload["usage"]["output_tokens"]

  print(f"text={response_text!r}")
  print(f"stop_reason={stop_reason}")
  print(f"total_tokens={total_tokens}")

test_cases:
  - id: test-body-shape
    description: "El body tiene model, max_tokens y messages bien formados"
    test_code: |
      assert body["model"] == "claude-haiku-4-5"
      assert body["max_tokens"] == 128
      assert isinstance(body["messages"], list) and len(body["messages"]) == 1
      assert body["messages"][0]["role"] == "user"
    points: 3

  - id: test-headers
    description: "Los 3 headers obligatorios están presentes"
    test_code: |
      assert headers.get("x-api-key", "").startswith("sk-ant-api")
      assert headers.get("anthropic-version") == "2023-06-01"
      assert headers.get("content-type") == "application/json"
    points: 3

  - id: test-extraction
    description: "Los tres valores extraídos tienen la forma esperada"
    test_code: |
      assert isinstance(response_text, str) and len(response_text) > 0
      assert stop_reason in {"end_turn", "max_tokens", "stop_sequence"}
      assert isinstance(total_tokens, int) and total_tokens > 0
    points: 4

hints:
  - "Los 3 headers obligatorios son: x-api-key, anthropic-version (valor 2023-06-01), content-type (valor application/json)."
  - "`payload['content']` es un array — el primer bloque es `payload['content'][0]` y ese bloque tiene `type='text'` y `text='...'`."
  - "`usage` está directamente en el payload raíz; tiene `input_tokens` y `output_tokens` como claves separadas."

