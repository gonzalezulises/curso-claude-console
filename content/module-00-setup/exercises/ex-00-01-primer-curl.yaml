description: |
  En la Lección 04 ejecutaste un curl a /v1/messages. Ahora vas a hacer
  exactamente lo mismo desde Python usando la librería estándar `urllib`
  (sin el SDK oficial, para forzarte a entender el protocolo HTTP puro).

  El objetivo es que construyas el request a mano, lo envíes, y extraigas
  tres campos específicos de la respuesta.

