  import json
  import os
  import urllib.request

  API_KEY = os.environ.get("ANTHROPIC_API_KEY")
  if not API_KEY:
      raise SystemExit("Falta ANTHROPIC_API_KEY en el entorno")

  URL = "https://api.anthropic.com/v1/messages"

  # TODO 1: armar el diccionario `body` con los 3 campos obligatorios
  #         (model, max_tokens, messages). Usa claude-haiku-4-5 y max_tokens=128.
  #         El único mensaje debe ser del rol "user" pidiendo a Claude
  #         que responda con la palabra "ok" y nada más.
  body = {}

  # TODO 2: armar el diccionario `headers` con los 3 headers obligatorios
  #         (x-api-key, anthropic-version, content-type).
  headers = {}

  request = urllib.request.Request(
      URL,
      data=json.dumps(body).encode("utf-8"),
      headers=headers,
      method="POST",
  )

  with urllib.request.urlopen(request) as response:
      payload = json.loads(response.read())

  # TODO 3: extraer de `payload` estos tres valores y ponerlos en variables.
  #         - response_text: el texto del primer bloque de content
  #         - stop_reason: el motivo de parada
  #         - total_tokens: suma de input_tokens + output_tokens
  response_text = ""
  stop_reason = ""
  total_tokens = 0

  print(f"text={response_text!r}")
