solution_code: |
  import json
  import os
  import urllib.request

  API_KEY = os.environ.get("ANTHROPIC_API_KEY")
  if not API_KEY:
      raise SystemExit("Falta ANTHROPIC_API_KEY en el entorno")

  URL = "https://api.anthropic.com/v1/models?limit=50"

  request = urllib.request.Request(
      URL,
      headers={
          "x-api-key": API_KEY,
          "anthropic-version": "2023-06-01",
      },
      method="GET",
  )

  with urllib.request.urlopen(request) as response:
      payload = json.loads(response.read())

  model_ids = [m["id"] for m in payload["data"]]

  required = {"claude-haiku-4-5", "claude-sonnet-4-6", "claude-opus-4-6"}
  missing = required - set(model_ids)

  counts = {
      "haiku":  sum(1 for mid in model_ids if "haiku"  in mid),
      "sonnet": sum(1 for mid in model_ids if "sonnet" in mid),
      "opus":   sum(1 for mid in model_ids if "opus"   in mid),
  }

  print(f"total models: {len(model_ids)}")
  print(f"counts: {counts}")
  if missing:
      print(f"FALTAN: {missing}")
  else:
      print("OK: los 3 aliases base del curso están disponibles")

test_cases:
  - id: test-headers-present
    description: "GET usa x-api-key y anthropic-version (NO necesita content-type)"
    test_code: |
      assert request.headers.get("X-api-key", "").startswith("sk-ant-api")
      assert request.headers.get("Anthropic-version") == "2023-06-01"
    points: 3

  - id: test-model-ids-extracted
    description: "model_ids contiene strings no vacíos"
    test_code: |
      assert isinstance(model_ids, list) and len(model_ids) > 0
      assert all(isinstance(m, str) and len(m) > 0 for m in model_ids)
    points: 3

  - id: test-required-present
    description: "Los 3 aliases base del curso están presentes"
    test_code: |
      assert "claude-haiku-4-5"  in model_ids
      assert "claude-sonnet-4-6" in model_ids
      assert "claude-opus-4-6"   in model_ids
      assert missing == set()
    points: 2

  - id: test-counts-family
    description: "counts tiene al menos 1 en cada familia"
    test_code: |
      assert counts["haiku"]  >= 1
      assert counts["sonnet"] >= 1
      assert counts["opus"]   >= 1
    points: 2

hints:
  - "Los GET también requieren x-api-key y anthropic-version, pero NO content-type (porque no hay body)."
  - "payload['data'] es una lista de dicts, cada uno con 'id', 'display_name' y 'type'."
  - "Para contar por familia, iterá con `for mid in model_ids` y chequeá substring: `'haiku' in mid`."

