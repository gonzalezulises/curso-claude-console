description: |
  Llamá al endpoint GET /v1/models de tu workspace, parseá la respuesta,
  y verificá que los tres modelos base que usa el curso (haiku 4.5, sonnet 4.6,
  opus 4.6) están disponibles. También tenés que contar cuántos modelos de
  cada familia hay.

