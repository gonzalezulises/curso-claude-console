description: |
  Construir, subir y probar una skill `markdown-report` que enforca un
  formato estándar de reporte markdown (frontmatter + 5 secciones + metric
  blocks) usando un validador Python como gate de calidad.

  El objetivo: demostrar el patrón "skill como proceso completo con
  enforcement" — no solo instrucciones, sino código que rechaza outputs
  malformados y fuerza al modelo a corregir.

