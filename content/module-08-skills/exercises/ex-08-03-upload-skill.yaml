id: ex-08-03-upload-skill
type: code-typescript
title: "Subir una skill custom, verificar con list, invocarla y limpiar"
lesson_ref: lesson-08-05
difficulty: intermediate
estimated_time_minutes: 20
points: 20

description: |
  Implementar el lifecycle completo de una skill custom contra el API:
  1. Escribir SKILL.md localmente.
  2. POST /v1/skills con multipart upload.
  3. GET /v1/skills?source=custom para verificar que aparece.
  4. Invocar /v1/messages con la skill activa.
  5. DELETE versiones + skill (cleanup).

  Ejercicio pensado para ejecutarse end-to-end contra la API real.

