solution_code: |
  import Anthropic from "@anthropic-ai/sdk";

  const client = new Anthropic();

  const problem = `En una carrera, Ana llega antes que Bruno. Carlos llega
  después que Diana pero antes que Ana. Elena llega última. Bruno llega
  antes que Diana. ¿Cuál es el orden completo de llegada, del primero al último?

  Responde solo con los nombres en orden, separados por coma.`;

  async function sinThinking() {
    console.log("=== Sin thinking ===");
    const resp = await client.messages.create({
      model: "claude-sonnet-4-6",
      max_tokens: 200,
      messages: [{ role: "user", content: problem }],
    });
    const text = resp.content.find((b) => b.type === "text");
    console.log("Texto:", text?.type === "text" ? text.text : "n/a");
    console.log("Usage:", resp.usage);
  }

  async function conThinking2k() {
    console.log("\n=== Thinking budget=2048 ===");
    const resp = await client.messages.create({
      model: "claude-sonnet-4-6",
      max_tokens: 8000,
      thinking: { type: "enabled", budget_tokens: 2048 },
      messages: [{ role: "user", content: problem }],
    });
    for (const block of resp.content) {
      if (block.type === "thinking") {
        console.log("Thinking (first 300):", block.thinking.slice(0, 300));
      } else if (block.type === "text") {
        console.log("Texto:", block.text);
      }
    }
    console.log("Usage:", resp.usage);
  }

  async function conThinking8k() {
    console.log("\n=== Thinking budget=8000 ===");
    const resp = await client.messages.create({
      model: "claude-sonnet-4-6",
      max_tokens: 16000,
      thinking: { type: "enabled", budget_tokens: 8000 },
      messages: [{ role: "user", content: problem }],
    });
    for (const block of resp.content) {
      if (block.type === "thinking") {
        console.log("Thinking (first 300):", block.thinking.slice(0, 300));
      } else if (block.type === "text") {
        console.log("Texto:", block.text);
      }
    }
    console.log("Usage:", resp.usage);
  }

  await sinThinking();
  await conThinking2k();
  await conThinking8k();

test_cases:
  - id: test-sin-thinking
    description: "La función sinThinking llama sin el parámetro thinking"
    test_code: |
      // Verificación manual: la llamada no debe incluir thinking
      assert typeof sinThinking === "function", "sinThinking debe existir";
    points: 3
  - id: test-con-thinking-2k
    description: "La función conThinking2k usa budget_tokens 2048"
    test_code: |
      assert typeof conThinking2k === "function", "conThinking2k debe existir";
    points: 4
  - id: test-con-thinking-8k
    description: "La función conThinking8k usa budget_tokens 8000 con max_tokens mayor"
    test_code: |
      assert typeof conThinking8k === "function", "conThinking8k debe existir";
    points: 4
  - id: test-blocks-separated
    description: "Las funciones con thinking separan bloques thinking y text"
    test_code: |
      // El alumno debe iterar content blocks por tipo
      assert true, "Verificar manualmente que se itera por block.type";
    points: 4

hints:
  - "budget_tokens debe ser ≥ 1024 y estrictamente menor que max_tokens"
  - "Iterá resp.content con for...of y chequeá block.type === 'thinking' vs 'text'"
  - "El modelo Haiku no soporta extended thinking — usá Sonnet 4.6"
  - "El campo thinking del bloque thinking contiene el razonamiento como string"

