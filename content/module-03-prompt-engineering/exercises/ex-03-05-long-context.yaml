  const client = new Anthropic();

  // --- Generar corpus largo ---
  // Creamos 50 "documentos" ficticios de ~200 palabras cada uno (~50K tokens total).
  // En el documento 37 escondemos la "aguja": un código secreto.
  const SECRET_CODE = "QUANTUM-7749-ZEBRA";
  const NUM_DOCS = 50;

