id: module-03
slug: module-03-prompt-engineering
title: "Prompt Engineering de Arquitecto"
order: 3
duration_hours: 5
is_locked: false
status: in_progress

description: >
  Técnicas de prompt engineering específicamente documentadas por Anthropic
  para Claude 4.x: ser directo, few-shot, chain of thought, extended thinking
  con budget tokens, XML tags, system prompts efectivos, prefill del assistant
  y estrategias de long context hasta 1M tokens. Cierra con un lab que
  refactoriza un prompt real midiendo impacto.

learning_outcomes:
  - "Reescribir prompts vagos a directos con verbos imperativos y outcomes explícitos"
  - "Decidir cuántos ejemplos few-shot usar y cómo cubrir edge cases sin sesgar"
  - "Elegir entre chain of thought clásico y extended thinking según el problema"
  - "Configurar thinking.type y budget_tokens correctamente para Claude 4.x"
  - "Estructurar prompts densos con XML tags que Claude interpreta de forma consistente"
  - "Escribir system prompts con rol, audiencia, formato y restricciones efectivas"
  - "Forzar formatos estrictos con prefill del turno assistant"
  - "Diseñar prompts long-context para que el modelo use el material de forma confiable"
  - "Refactorizar un prompt caótico aplicando las 8 técnicas y medir el impacto"

prerequisites:
  - "Módulo 1 completo (Messages API)"
  - "Familiaridad con iteración de prompts (Módulo 2 recomendado, no obligatorio)"

