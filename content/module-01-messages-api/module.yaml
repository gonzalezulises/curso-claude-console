id: module-01
slug: module-01-messages-api
title: "Messages API: Fundamentos"
order: 1
duration_hours: 5
is_locked: false
status: in_progress

description: >
  Dominio completo del único endpoint sobre el que se construye todo lo demás
  del curso: /v1/messages. Parámetros del request, anatomía de la respuesta,
  system prompts, conversaciones multi-turno, streaming SSE, count_tokens,
  errores y retries. Cierra con un lab de chat CLI persistente en TypeScript.

learning_outcomes:
  - "Elegir entre Haiku 4.5, Sonnet 4.6 y Opus 4.6 basado en costo, latencia y capacidad"
  - "Distinguir aliases estables de snapshots con fecha y saber cuándo usar cada uno"
  - "Controlar cada parámetro del request (temperature, top_p, stop_sequences, metadata)"
  - "Leer cualquier respuesta de la API, incluyendo content como array de bloques y usage completo"
  - "Escribir system prompts efectivos y mantener conversaciones multi-turno"
  - "Consumir streaming SSE tanto a mano con curl como con el SDK"
  - "Presupuestar prompts con /v1/messages/count_tokens antes de enviarlos"
  - "Reconocer cada código de error de la API y aplicar la política correcta (retry/fatal/degradar)"
  - "Implementar retries con exponential backoff correctamente"
  - "Construir un chat CLI persistente con historial, streaming y reporte de costo"

prerequisites:
  - "Módulo 0 completo (cuenta, key, primer curl, setup local)"
  - "Entender HTTP request/response y JSON"

