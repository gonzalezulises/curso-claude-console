id: ex-01-07-chat-cli
type: code-typescript
title: "Extendé el chat CLI con sliding window y comando /tokens"
lesson_ref: lesson-01-10
difficulty: advanced
estimated_time_minutes: 25
points: 25

description: |
  Tomando como base el chat-cli.ts del lab de la Lección 10, vas a agregar
  dos features:

  1. **Sliding window ADAPTATIVO**: en vez de un MAX fijo de 20 turnos,
     trimHistory debe respetar un presupuesto máximo de `MAX_INPUT_TOKENS`
     (ej. 5000). Usás count_tokens para medir el costo real del historial
     y vas podando desde el turno más viejo hasta que entre.

  2. **Comando `/tokens`**: cuando el usuario tipea `/tokens`, el CLI llama
     a count_tokens sobre el historial actual (sin enviar nada) y reporta
     cuántos input_tokens consumiría el próximo turno si no cambiara.

  Respaldo mental: este ejercicio te fuerza a integrar multi-turno + count_tokens
  en una sola app. Es el patrón real que vas a usar en producción.

