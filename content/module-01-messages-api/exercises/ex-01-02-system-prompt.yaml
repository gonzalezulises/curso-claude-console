description: |
  En la Lección 04 vimos que un system prompt pidiendo "solo JSON" no siempre
  devuelve JSON limpio. En este ejercicio vas a escribir un `system` + la
  técnica de prefill de la Lección 05 para garantizar que la respuesta sea
  un objeto JSON parseable con 3 campos específicos.

  La tarea: extraer datos de un nombre de ciudad que el usuario mencione.

