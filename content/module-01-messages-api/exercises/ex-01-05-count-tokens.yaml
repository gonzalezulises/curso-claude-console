description: |
  Implementá una función `estimatePromptCost` que usa POST /v1/messages/count_tokens
  para obtener los input_tokens exactos de un prompt + system, y después
  calcula el costo máximo en USD asumiendo un `max_tokens` de output.

  El objetivo: aprender el patrón canónico "presupuestar antes de enviar" que
  te protege de disparar un request caro por accidente.

