solution_code: |
  import "dotenv/config";

  const PRICING = {
    "claude-haiku-4-5": { input: 1, output: 5 },
    "claude-sonnet-4-6": { input: 3, output: 15 },
    "claude-opus-4-6": { input: 5, output: 25 },
  } as const;

  type CostEstimate = {
    inputTokens: number;
    maxOutputTokens: number;
    worstCaseUSD: number;
  };

  async function estimatePromptCost(
    model: keyof typeof PRICING,
    system: string,
    userMessage: string,
    maxOutputTokens: number
  ): Promise<CostEstimate> {
    const response = await fetch("https://api.anthropic.com/v1/messages/count_tokens", {
      method: "POST",
      headers: {
        "x-api-key": process.env.ANTHROPIC_API_KEY!,
        "anthropic-version": "2023-06-01",
        "content-type": "application/json",
      },
      body: JSON.stringify({
        model,
        system,
        messages: [{ role: "user", content: userMessage }],
      }),
    });

    if (!response.ok) {
      throw new Error(`count_tokens failed: ${response.status} ${await response.text()}`);
    }

    const { input_tokens } = (await response.json()) as { input_tokens: number };

    const pricing = PRICING[model];
    const worstCaseUSD =
      (input_tokens * pricing.input + maxOutputTokens * pricing.output) / 1_000_000;

    return {
      inputTokens: input_tokens,
      maxOutputTokens,
      worstCaseUSD,
    };
  }

  async function main() {
    const estimate = await estimatePromptCost(
      "claude-sonnet-4-6",
      "Eres un asistente técnico. Respondes en 3 frases.",
      "Explicá qué es TLS y por qué importa.",
      300
    );

    console.log(`Input tokens: ${estimate.inputTokens}`);
    console.log(`Max output tokens: ${estimate.maxOutputTokens}`);
    console.log(`Costo peor caso: $${estimate.worstCaseUSD.toFixed(6)}`);

    if (estimate.worstCaseUSD > 0.01) {
      console.warn("Aviso: este prompt podría costar más de 1 centavo.");
    }
  }

  main();

test_cases:
  - id: test-count-tokens-returns-input-tokens
    description: "La función devuelve un inputTokens > 0 de la API real"
    test_code: |
      const estimate = await estimatePromptCost(
        "claude-haiku-4-5",
        "Sos un asistente breve.",
        "Hola.",
        50
      );
      assert estimate.inputTokens > 0;
      assert estimate.inputTokens < 200; // prompt corto
    points: 6

  - id: test-cost-calculation
    description: "worstCaseUSD usa la fórmula correcta con los precios del PRICING"
    test_code: |
      const estimate = await estimatePromptCost(
        "claude-sonnet-4-6",
        "Sos un asistente.",
        "Hola.",
        100
      );
      // Con Sonnet ($3/$15) y 100 output tokens, el componente de output es
      // 100 * 15 / 1_000_000 = $0.0015 fijo. El input varía.
      const expectedOutputCost = (100 * 15) / 1_000_000;
      assert estimate.worstCaseUSD >= expectedOutputCost;
      // Y el total debe ser razonablemente cercano (input + output).
      const actualInputCost = (estimate.inputTokens * 3) / 1_000_000;
      assert Math.abs(estimate.worstCaseUSD - (actualInputCost + expectedOutputCost)) < 0.00001;
    points: 6

  - id: test-does-not-send-max-tokens
    description: "El body de count_tokens NO incluye max_tokens (campo inválido)"
    test_code: |
      // Validado por inspección del código: max_tokens no debe estar en el body
      // del request a count_tokens (fuera del parámetro maxOutputTokens que es
      // solo para el cálculo, nunca se envía a la API).
    points: 3

hints:
  - "El endpoint es POST /v1/messages/count_tokens — mismo shape de body que /v1/messages pero sin max_tokens ni temperature."
  - "La respuesta es simple: { input_tokens: number }."
  - "Fórmula: costUSD = (inputTokens * precioInput + maxOutputTokens * precioOutput) / 1_000_000"
  - "Los precios están en USD por MILLÓN de tokens — por eso dividimos entre 1_000_000 al final."
  - "No llames a count_tokens en cada request de producción en caliente — es gratis en $ pero consume rate limit."

