solution_code: |
  from typing import Any

  SAMPLE_PAYLOAD: dict[str, Any] = {
      "id": "msg_01ABC",
      "type": "message",
      "role": "assistant",
      "model": "claude-sonnet-4-6",
      "content": [
          {"type": "thinking", "thinking": "Debo explicar qué es TCP en términos simples."},
          {"type": "text", "text": "TCP es un protocolo de red orientado a conexión. "},
          {"type": "text", "text": "Garantiza entrega ordenada y sin duplicados."},
      ],
      "stop_reason": "end_turn",
      "stop_sequence": None,
      "usage": {
          "input_tokens": 45,
          "output_tokens": 87,
          "cache_creation_input_tokens": 0,
          "cache_read_input_tokens": 0,
      },
  }

  def extract_response_summary(payload: dict[str, Any]) -> dict[str, Any]:
      content_blocks = payload.get("content", [])

      text_blocks = [b for b in content_blocks if b.get("type") == "text"]
      visible_text = "".join(b.get("text", "") for b in text_blocks)

      has_thinking = any(b.get("type") == "thinking" for b in content_blocks)

      usage = payload.get("usage", {})

      return {
          "visible_text": visible_text,
          "stop_reason": payload.get("stop_reason"),
          "input_tokens": usage.get("input_tokens", 0),
          "output_tokens": usage.get("output_tokens", 0),
          "has_thinking": has_thinking,
      }


  if __name__ == "__main__":
      result = extract_response_summary(SAMPLE_PAYLOAD)
      print(result)

test_cases:
  - id: test-visible-text-concat
    description: "visible_text concatena SOLO los bloques type='text', en orden"
    test_code: |
      result = extract_response_summary(SAMPLE_PAYLOAD)
      assert result["visible_text"] == "TCP es un protocolo de red orientado a conexión. Garantiza entrega ordenada y sin duplicados."
    points: 4

  - id: test-usage-extraction
    description: "input_tokens y output_tokens vienen del objeto usage"
    test_code: |
      result = extract_response_summary(SAMPLE_PAYLOAD)
      assert result["input_tokens"] == 45
      assert result["output_tokens"] == 87
    points: 3

  - id: test-has-thinking-detection
    description: "has_thinking es True cuando hay al menos un bloque thinking"
    test_code: |
      result = extract_response_summary(SAMPLE_PAYLOAD)
      assert result["has_thinking"] is True

      payload_sin_thinking = {
          "content": [{"type": "text", "text": "solo texto"}],
          "stop_reason": "end_turn",
          "usage": {"input_tokens": 10, "output_tokens": 5},
      }
      assert extract_response_summary(payload_sin_thinking)["has_thinking"] is False
    points: 3

  - id: test-stop-reason
    description: "stop_reason se extrae correctamente"
    test_code: |
      result = extract_response_summary(SAMPLE_PAYLOAD)
      assert result["stop_reason"] == "end_turn"
    points: 2

hints:
  - "Usá list comprehension para filtrar bloques: `[b for b in content if b.get('type') == 'text']`"
  - "Acordate: `content[0]` puede no ser texto. Nunca hagas `payload['content'][0]['text']` directo."
  - "Para concatenar N strings eficientemente: `''.join(lista_de_strings)`."
  - "El campo `text` de un bloque thinking no se llama `.text` sino `.thinking` — por eso filtrás por `type == 'text'` y solo accedés `.text` en esos."

