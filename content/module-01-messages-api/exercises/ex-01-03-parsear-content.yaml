id: ex-01-03-parsear-content
type: code-python
title: "Parseá una respuesta con múltiples bloques de content"
lesson_ref: lesson-01-03
difficulty: intermediate
estimated_time_minutes: 8
points: 12

description: |
  El campo `content` de una respuesta es SIEMPRE un array de bloques, no un
  string. Un parser robusto tiene que filtrar por tipo, concatenar solo el
  texto visible y leer el usage completo — no confiar en `content[0].text`.

  En este ejercicio recibís un payload ya serializado (simulando una respuesta
  real con múltiples bloques) y tenés que implementar la función
  `extract_response_summary` que devuelva un dict con:
  - visible_text: el texto concatenado de todos los bloques type="text"
  - stop_reason: el motivo de parada
  - input_tokens, output_tokens: desde usage
  - has_thinking: bool indicando si hay al menos un bloque type="thinking"

