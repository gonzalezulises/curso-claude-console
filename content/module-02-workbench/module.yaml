id: module-02
slug: module-02-workbench
title: "Workbench: El Laboratorio"
order: 2
duration_hours: 3
is_locked: false
status: in_progress

description: >
  Dominio del Workbench de platform.claude.com como laboratorio de
  iteración de prompts. Tour de la interfaz, ciclo edit-run-compare,
  parámetros en vivo (temperature, max_tokens, thinking), Files API,
  definición de tools desde la UI, y exportación a código con Get Code.

learning_outcomes:
  - "Navegar la interfaz de Claude Console: sidebar, Workbench, Files, Skills, Analytics"
  - "Iterar prompts en el Workbench con el ciclo edit-run-compare sin escribir código"
  - "Entender qué hace temperature, max_tokens y el toggle de thinking en la UI"
  - "Subir archivos con Files API y usarlos como referencia en prompts"
  - "Definir tools custom y web search desde el panel Tools del Workbench"
  - "Exportar un prompt como snippet de código (Python/TS/curl) con Get Code"
  - "Identificar qué partes del snippet exportado hay que cambiar para producción"

prerequisites:
  - "Módulo 0 completo (cuenta, API key)"
  - "Módulo 1 completo (entender request/response/parameters)"

